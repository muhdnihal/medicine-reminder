<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MedPulse Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

/* 🌌 PREMIUM BACKGROUND */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;

  background:
    linear-gradient(rgba(15,23,42,0.85), rgba(2,6,23,0.95)),
    url('https://images.unsplash.com/photo-1588776814546-1ffcf47267a5');

  background-size:cover;
  background-position:center;
  color:white;
}

/* ✨ Glow Effects */
.glow{
  position:absolute;
  width:300px;
  height:300px;
  background: radial-gradient(circle,#7c3aed,transparent);
  filter:blur(120px);
  animation: float 6s infinite alternate;
}

.glow:nth-child(1){top:10%; left:10%;}
.glow:nth-child(2){bottom:10%; right:10%; animation-delay:2s;}

@keyframes float{
  from{transform:translateY(0)}
  to{transform:translateY(40px)}
}

/* ❤️ Floating Icons */
.icon{
  position:absolute;
  font-size:26px;
  color:#38bdf8;
  text-shadow:0 0 10px #38bdf8;
  animation: floatIcon 8s linear infinite;
}

@keyframes floatIcon{
  0%{transform:translateY(100vh); opacity:0}
  50%{opacity:1}
  100%{transform:translateY(-10vh); opacity:0}
}

/* 💎 Login Card */
.container{
  position:relative;
  z-index:2;
  width:350px;
  padding:40px;
  border-radius:20px;

  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,0.1);

  box-shadow:0 0 40px rgba(124,58,237,0.4);
  text-align:center;
}

/* Title */
h2{
  margin-bottom:20px;
  color:#38bdf8;
}

/* Inputs */
input{
  width:100%;
  padding:12px;
  margin:12px 0;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

input:focus{
  box-shadow:0 0 10px #06b6d4;
}

/* Button */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#7c3aed,#06b6d4);
  color:white;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #06b6d4;
}

/* Microsoft Button */
.ms-btn{
  background:linear-gradient(135deg,#2563eb,#1e40af);
}

/* Signup Text */
.signup-text{
  margin-top:15px;
  font-size:14px;
  color:#cbd5f5;
}

.signup-text a{
  color:#38bdf8;
  text-decoration:none;
  font-weight:500;
}
</style>
</head>

<body>

<!-- ✨ Glow -->
<div class="glow"></div>
<div class="glow"></div>

<!-- ❤️ Floating Icons -->
<div class="icon" style="left:10%; animation-delay:0s;">💊</div>
<div class="icon" style="left:30%; animation-delay:2s;">❤️</div>
<div class="icon" style="left:55%; animation-delay:4s;">🩺</div>
<div class="icon" style="left:80%; animation-delay:6s;">⏰</div>

<!-- 💎 Login Card -->
<div class="container">
  <h2>MedPulse</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <!-- 🔵 Microsoft Login -->
  <button class="ms-btn" onclick="loginWithMicrosoft()">Login with Microsoft</button>

  <div class="signup-text">
    Don't have an account? <a href="signup.html">Sign Up</a>
  </div>
</div>
<script>
function login(){
  let user = document.getElementById("username").value.trim();
  let pass = document.getElementById("password").value.trim();

  let storedUser = localStorage.getItem("user");
  let storedPass = localStorage.getItem("pass");

  console.log("Entered:", user, pass);
  console.log("Stored:", storedUser, storedPass);

  if(!storedUser || !storedPass){
    alert("No account found. Please signup first.");
    return;
  }

  if(user.toLowerCase() === storedUser.toLowerCase() && pass === storedPass){
    localStorage.setItem("loggedIn","true");
    window.location.href="dashboard.html";
  } else {
    alert("Invalid login!");
  }
}
</script>
  
</body>
</html>
